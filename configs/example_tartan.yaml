robot:
  shape: "square"          # "square" or "round"
  size: 3.0                # footprint size in metres (side length or diameter)
  height_min: -2.0         # ground points lower than this are ignored
  height_max:  1.0         # ground points higher than this are ignored
  trajectory_window: 200   # number of scans before/after to include as trajectory
  accum_window: 20         # past scans to accumulate when labeling (fills blind spot under vehicle)

data:
  source: "data/tartandrive_data/"
  lidar_subdir: "velodyne_1"         # "livox", "velodyne_0", or "velodyne_1"
  odom_subdir:        "gps_odom"      # "super_odom" (local frame) or "gps_odom" (UTM/global)
  lidar_poses_subdir: "gicp_poses"   # precomputed KISS-ICP poses + GPS z-correction (set to null to use odom only)
  static_tf_file: "resources/tartan_static_transforms.npy"
  lidar_tf_key: "vehicle__to__velodyne_2"  # key in static_tf_file; omit or set null to skip
  max_rad: 50.0                      # ignore points farther than this (metres)

setting:
  forward_accum: True     # True -> only include forward-seen points from past scans in the accumulation
